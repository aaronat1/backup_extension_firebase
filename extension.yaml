name: firestore-backup-scheduler
version: 0.1.2
specVersion: v1beta
displayName: Firestore Backup Scheduler
description: >-
  Automatically exports Firestore data to a Cloud Storage bucket on a configurable
  schedule. Supports full database exports or per-collection exports, giving you
  reliable automated backups with zero manual intervention.
license: Apache-2.0
stage: stable
icon: icon.png
author:
  authorName: aaronat1
  authorUrl: https://github.com/aaronat1
sourceUrl: https://github.com/aaronat1/firestore-backup-scheduler
billingRequired: true

roles:
  - role: datastore.importExportAdmin
    reason: Required to export Firestore data to Cloud Storage.
  - role: storage.admin
    reason: Required to write export files to the configured Cloud Storage bucket.

resources:
  - name: scheduledBackup
    type: firebaseextensions.v1beta.function
    description: >-
      Scheduled function that triggers a Firestore export to Cloud Storage
      at the configured interval.
    properties:
      location: ${LOCATION}
      runtime: nodejs20
      scheduleTrigger:
        schedule: ${BACKUP_SCHEDULE}
        timeZone: ${BACKUP_TIMEZONE}

params:
  - param: LOCATION
    label: Cloud Functions location
    description: >-
      Where do you want to deploy the functions created for this extension?
    type: select
    options:
      - label: Iowa (us-central1)
        value: us-central1
      - label: South Carolina (us-east1)
        value: us-east1
      - label: Northern Virginia (us-east4)
        value: us-east4
      - label: Los Angeles (us-west2)
        value: us-west2
      - label: Salt Lake City (us-west3)
        value: us-west3
      - label: Las Vegas (us-west4)
        value: us-west4
      - label: Belgium (europe-west1)
        value: europe-west1
      - label: London (europe-west2)
        value: europe-west2
      - label: Frankfurt (europe-west3)
        value: europe-west3
      - label: Zurich (europe-west6)
        value: europe-west6
      - label: Taiwan (asia-east1)
        value: asia-east1
      - label: Hong Kong (asia-east2)
        value: asia-east2
      - label: Tokyo (asia-northeast1)
        value: asia-northeast1
      - label: Osaka (asia-northeast2)
        value: asia-northeast2
      - label: Seoul (asia-northeast3)
        value: asia-northeast3
      - label: Mumbai (asia-south1)
        value: asia-south1
      - label: Singapore (asia-southeast1)
        value: asia-southeast1
      - label: Jakarta (asia-southeast2)
        value: asia-southeast2
      - label: Sydney (australia-southeast1)
        value: australia-southeast1
    required: true
    immutable: true

  - param: BACKUP_BUCKET
    label: Cloud Storage backup bucket
    description: >-
      The Cloud Storage bucket where Firestore exports will be stored.
      Format: gs://your-bucket-name (without trailing slash).
      The bucket must already exist and the service account must have write access.
    type: string
    required: true

  - param: BACKUP_SCHEDULE
    label: Backup schedule (cron or App Engine format)
    description: >-
      How often to run the backup. Examples:
      "every 24 hours", "every day 02:00", "0 2 * * *" (daily at 2am).
    type: string
    default: every 24 hours
    required: true

  - param: BACKUP_TIMEZONE
    label: Timezone for the backup schedule
    description: >-
      IANA timezone string for interpreting the backup schedule.
      Examples: America/New_York, Europe/Madrid, Asia/Tokyo.
    type: string
    default: UTC
    required: true

  - param: COLLECTIONS_TO_BACKUP
    label: Collections to backup (optional)
    description: >-
      Comma-separated list of collection IDs to export.
      Leave empty to export the entire database.
    type: string
    required: false

  - param: BACKUP_LOG_COLLECTION
    label: Backup log collection (optional)
    description: >-
      Firestore collection where backup results are logged.
      Leave empty to disable logging.
    type: string
    default: _ext_backup_logs
    required: false
